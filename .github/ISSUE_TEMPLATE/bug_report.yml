name: Bug report
description: Something's broken — the dock, the brief, or the summariser
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks! Most issues can be diagnosed from one paste: run **`/claude-brief:brief debug`**
        in the affected session and paste the report below. It is sanitised by design —
        env vars appear as presence/length only (never values), and it contains no
        conversation text, no brief content, and no window titles. (On a manual
        `~/.claude` install the command is `/brief debug`.)
  - type: textarea
    id: debug-report
    attributes:
      label: /brief debug output
      description: Paste the full report. If the command itself fails, paste whatever it printed.
      render: text
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened, and what did you expect?
      placeholder: e.g. "/brief opens the dock but it shows 'No brief yet' forever — expected the brief after my next turn."
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal app + version (if dock-related)
      placeholder: e.g. iTerm2 3.6.11 / kitty 0.40 / tmux 3.6 inside Apple Terminal
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Unusual setup worth knowing — gateway/proxy auth, per-project env overrides, SSH/remote session, multiple installs…
