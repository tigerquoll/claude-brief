# Cut a GitHub Release when you push a version tag (vX.Y.Z): build a source tarball
# and attach it as a release ASSET. That attached asset is the thing GitHub counts in
# download_count — the auto-generated "Source code (zip/tar.gz)" archives are NOT
# counted. The count powers the downloads badge and the stable install URL
# https://github.com/<owner>/claude-brief/releases/latest/download/claude-brief.tar.gz
#
# Cut a release:
#   git tag -a v0.4.0 -m "claude-brief v0.4.0" && git push origin v0.4.0
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write          # create the release + upload the asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build a lean tarball (+ pointer back to the repo)
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"                      # v0.4.0 -> 0.4.0
          stage="claude-brief-${ver}"
          mkdir -p "$stage"
          # tracked files minus .gitattributes export-ignore (docs, CI, dev tooling);
          # the asset NAME stays version-less so releases/latest/download/<name> is stable.
          git archive "${GITHUB_REF_NAME}" | tar -x -C "$stage"
          # this archive is a lean snapshot — point users at the canonical project
          printf '%s\n' \
            "claude-brief ${GITHUB_REF_NAME} — live session-brief dock for Claude Code" \
            "" \
            "This archive is a lean release snapshot (install payload only)." \
            "" \
            "Install:" \
            "  ./install.sh        # dependency check, then copies into ~/.claude" \
            "Then add three hooks to ~/.claude/settings.json:" \
            '  UserPromptSubmit -> bash "$HOME/.claude/hooks/task-prompt-hook.sh"' \
            '  Stop             -> bash "$HOME/.claude/hooks/task-summary-hook.sh"' \
            '  SessionEnd       -> bash "$HOME/.claude/hooks/session-end-hook.sh"' \
            "" \
            "Full docs, screenshots, source, and the latest release:" \
            "  https://github.com/tigerquoll/claude-brief" \
            > "$stage/README.txt"
          tar -czf claude-brief.tar.gz "$stage"

      - name: Publish release + upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" claude-brief.tar.gz \
            --repo "${{ github.repository }}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
